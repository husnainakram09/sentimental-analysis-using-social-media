version: '3.9'
services:
  mongodb:
    image: mongo:7
    container_name: sentiment-mongodb
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  backend:
    build: ./backend
    container_name: sentiment-backend
    ports:
      - '8000:8000'
    env_file:
      - ./backend/.env.example
    depends_on:
      - mongodb

volumes:
  mongo_data:
